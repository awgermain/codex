<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="35%" cy="26%" r="90%">
      <stop offset="0%" stop-color="#231d17"/>
      <stop offset="100%" stop-color="#140f0c"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7c079"/>
      <stop offset="52%" stop-color="#c79a4b"/>
      <stop offset="100%" stop-color="#a97e34"/>
    </linearGradient>
  </defs>

  <!-- token -->
  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#bg)"/>
  <rect x="3.75" y="3.75" width="92.5" height="92.5" rx="21.25" fill="none" stroke="#c79a4b" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- garnish pick + cherry -->
  <line x1="57" y1="37" x2="64" y2="24" stroke="#8a6d34" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="64.6" cy="23" r="3.1" fill="#b8531f"/>
  <circle cx="63.4" cy="21.8" r="0.9" fill="#e08a4f"/>

  <!-- coupe bowl (half-ellipse hanging from the rim) -->
  <path d="M27 38 A23 20 0 0 0 73 38 Z" fill="url(#brass)"/>
  <!-- rim -->
  <ellipse cx="50" cy="38" rx="23" ry="4.4" fill="#140f0c"/>
  <ellipse cx="50" cy="38" rx="23" ry="4.4" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <!-- liquid sheen -->
  <path d="M35 40 A15 12 0 0 0 65 40 Z" fill="#f0d191" fill-opacity="0.28"/>

  <!-- stem + foot -->
  <rect x="48.6" y="56" width="2.8" height="13" rx="1.2" fill="url(#brass)"/>
  <ellipse cx="50" cy="70.5" rx="12.5" ry="2.8" fill="url(#brass)"/>
</svg>
